services:
  postgres:
    image: postgres:17
    container_name: koita-postgres
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: username
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    ports:
      - "5432:5432"
    volumes:
      - koita-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d default"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: koita-app
    ports:
      - "9001:9001"
    environment:
      POSTGRES_URL: "jdbc:postgresql://postgres:5432/default"
      POSTGRES_USER: username
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  koita-pgdata:
